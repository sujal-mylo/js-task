<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegation Demo</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        ul {
            width: 300px;
            padding: 0;
            list-style: none;
            background: white;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        li {
            list-style: none;
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
            color: #555;
        }

        li:last-child {
            border-bottom: none;
        }

        li:hover {
            background-color: #f9f9f9;
        }

        .selected {
            background: #fff3cd;
            font-weight: bold;
        }

        .selected:hover {
            background: #ffe69c;
        }
    </style>
</head>
<body>

    <h2>Team Members</h2>

    <ul id="memberList">
        <li data-id="1">John</li>
        <li data-id="2">Alice</li>
        <li data-id="3">Bob</li>
        <li data-id="4">Emma</li>
    </ul>

    <script src="script.js"></script>

</body>
</html>
