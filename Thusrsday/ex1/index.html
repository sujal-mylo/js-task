<!DOCTYPE html>
<html>
<head>
  <title>Team Members</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      padding: 20px;
    }

    h2 {
      color: #333;
      margin-bottom: 20px;
    }

    ul {
      list-style: none;
      background: white;
      padding: 0;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    li {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      color: #555;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background-color: #f9f9f9;
    }
  </style>
</head>
<body>
  <h2>Team Members</h2>
  <ul id="team"></ul>
  <script type="module" src="index.js"></script>
</body>
</html>
